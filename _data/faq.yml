- question: "What is Zen Flow?"
  answer: "Zen Flow is a calming vinyasa-based class that seamlessly integrates breath and movement, allowing you to relax and stretch deeply while improving flexibility and mental clarity."

- question: "How does Core Fusion work?"
  answer: "Core Fusion blends yoga and pilates to strengthen your core, engage your abs and back, and improve overall body stability, balance, and posture."

- question: "What should I expect in a Sunrise Stretch class?"
  answer: "Sunrise Stretch offers a combination of slow-flow movements and deep stretching to release morning stiffness, increase flexibility, and help you start the day refreshed."

- question: "Is Booty Booster a challenging class?"
  answer: "Yes, Booty Booster is a high-energy class focused on toning, sculpting, and lifting the lower body through targeted strength exercises and dynamic movements."

- question: "Are your classes suitable for beginners?"
  answer: "Absolutely. Our studio offers a wide variety of classes tailored to all levels, and our experienced instructors provide guidance and modifications for beginners."

- question: "Where is The Yoga Studio located?"
  answer: "The Yoga Studio is located in Bali, Indonesia, offering a tranquil setting for you to reconnect with your mind, body, and spirit."
