<!------------ Technical Metadata  --------------------------------->
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!------------ SEO Metadata  --------------------------------->
{% seo title=false %}
<title> {{page.seo.title }} </title> 
<meta name="description" content="{{page.seo.description }}">
<meta name="keywords" content="{{page.seo.keywords }}">


<!------------  Social media sharing META Tags ------------>
<meta property="og:title" content="{{ page.title | default: site.data.site-settings.seo.title }}">
<meta property="og:description" content="{{ page.seo.description | default: site.data.site-settings.seo.description }}"> 
<meta property="og:image" content="{{ page.seo.social_image | default: site.data.site-settings.seo.social_image }}">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta property="og:type" content="website">
<meta name="twitter:card" content="{{ page.seo.twitter_card | default: site.data.site-settings.seo.twitter_card }}">
<meta name="og:site_name" content="{{ site.data.site-settings.seo.site_name }}">
<link rel="icon" type="image/png" href="{{ site.data.site-settings.seo.favicon_image }}">


<!-- Agentic Browsing Discovery -->
<link rel="alternate" type="text/markdown" href="/llms.txt" />
<link rel="alternate" type="text/markdown" href="/llms-full.txt" />

<!------------ Google Fonts ------------>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oranienbaum&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" as="style">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oranienbaum&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

 <!---------------Favicon--------------->
 <link rel="icon" type="image/png" href="/icons/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
<link rel="shortcut icon" href="/icons/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
<link rel="manifest" href="/icons/site.webmanifest" />

<!------------ Tailwind Stylesheet  ------------>
<link rel="stylesheet" type="text/css" href="/assets/css/output-style.css">

<!------------ CloudCannon Editor Stylesheet   ------------>
<link rel="stylesheet" type="text/css" href="/editor.css" />

<!------------ Custom Stylesheet   ------------>
<link rel="stylesheet" type="text/css" href="/style.css" />

<!-- GEO: Organisation Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{ site.data.site-settings.seo.site_name | default: 'The Yoga Studio' | escape }}",
  "url": "{{ site.url }}",
  "logo": "{{ site.url }}{{ site.data.site-settings.seo.favicon_image | default: '/icons/favicon-96x96.png' }}",
  "description": "{{ site.data.site-settings.seo.description | default: 'Discover The Yoga Studio, a tranquil space offering a variety of yoga classes for all levels.' | escape }}"
}
</script>

<!-- GEO: LocalBusiness / Entity Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "{{ site.data.site-settings.seo.site_name | default: 'The Yoga Studio' | escape }}",
  "url": "{{ site.url }}",
  "description": "{{ site.data.site-settings.seo.description | default: 'Discover The Yoga Studio, a tranquil space offering a variety of yoga classes for all levels.' | escape }}",
  "image": "{{ site.url }}/images/the-yoga-studio-refined-island-creations-website-design-development.png",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Bali",
    "addressCountry": "ID"
  }
}
</script>

<!-- Refined Island Creations Portfolio Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CreativeWork",
  "name": "The Yoga Studio - Custom-Coded Website by Refined Island Creations",
  "description": "A concept website for a yoga and wellness studio. Designed and built by Refined Island Creations as a portfolio demonstration of custom-coded wellness website design with class scheduling and booking integration.",
  "url": "https://the-yoga-studio.refinedislandcreations.com",
  "creator": {
    "@type": "Organization",
    "name": "Refined Island Creations",
    "url": "https://refinedislandcreations.com"
  },
  "isPartOf": {
    "@type": "CollectionPage",
    "name": "Portfolio - Refined Island Creations",
    "url": "https://refinedislandcreations.com/portfolio.html"
  },
  "about": {
    "@type": "SportsActivityLocation",
    "name": "The Yoga Studio"
  }
}
</script>

<!-- GEO: Breadcrumb Schema (For Google Rich Results) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [{
    "@type": "ListItem",
    "position": 1,
    "name": "Home",
    "item": "{{ site.url }}"
  }]
}
</script>
