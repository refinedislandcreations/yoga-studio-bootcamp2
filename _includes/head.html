<!------------ Technical Metadata  --------------------------------->
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!------------ SEO Metadata  --------------------------------->
{% seo %}

<!------------ Agentic Browsing Discovery ------------>
<link rel="sitemap" type="application/xml" title="Sitemap" href="{{ site.url | append: '/sitemap.xml' }}" />
<link rel="alternate" type="text/markdown" title="LLM summary" href="{{ site.url | append: '/llms.txt' }}" />
<link rel="alternate" type="text/markdown" title="LLM full guidelines" href="{{ site.url | append: '/llms-full.txt' }}" />

<!------------ Google Fonts ------------>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oranienbaum&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" as="style">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oranienbaum&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<!---------------Favicon--------------->
<link rel="icon" type="image/png" href="{{ site.url | append: '/icons/favicon-96x96.png' }}" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="{{ site.url | append: '/icons/favicon.svg' }}" />
<link rel="shortcut icon" href="{{ site.url | append: '/icons/favicon.ico' }}" />
<link rel="apple-touch-icon" sizes="180x180" href="{{ site.url | append: '/icons/apple-touch-icon.png' }}" />
<link rel="manifest" href="{{ site.url | append: '/icons/site.webmanifest' }}" />

<!------------ Stylesheets  ------------>
<link rel="preload" as="style" href="{{ '/assets/css/output-style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
<link rel="stylesheet" type="text/css" href="{{ '/assets/css/output-style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
<link rel="stylesheet" type="text/css" href="{{ '/editor.css' | relative_url }}?v={{ site.time | date: '%s' }}" />
<link rel="stylesheet" type="text/css" href="{{ '/style.css' | relative_url }}?v={{ site.time | date: '%s' }}" />

<!-- GEO: Consolidated Schema @graph (For Google Rich Results & AI) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "{{ site.url | append: '/#organization' }}",
      "name": "{{ site.title | escape }}",
      "url": "{{ site.url | append: '/' }}",
      "logo": {
        "@type": "ImageObject",
        "@id": "{{ site.url | append: '/#logo' }}",
        "inLanguage": "en-US",
        "url": "{{ site.url | append: '/icons/favicon-96x96.png' }}",
        "contentUrl": "{{ site.url | append: '/icons/favicon-96x96.png' }}",
        "caption": "{{ site.title | escape }}"
      },
      "image": { "@id": "{{ site.url | append: '/#logo' }}" }
    },
    {
      "@type": "WebSite",
      "@id": "{{ site.url | append: '/#website' }}",
      "url": "{{ site.url | append: '/' }}",
      "name": "{{ site.title | escape }}",
      "description": "{{ site.description | escape }}",
      "publisher": { "@id": "{{ site.url | append: '/#organization' }}" },
      "inLanguage": "en-US"
    },
    {
      "@type": "WebPage",
      "@id": "{{ site.url | append: page.url | append: '#webpage' }}",
      "url": "{{ site.url | append: page.url }}",
      "name": "{{ page.title | default: site.title | escape }}",
      "isPartOf": { "@id": "{{ site.url | append: '/#website' }}" },
      "about": { "@id": "{{ site.url | append: '/#organization' }}" },
      "description": "{{ page.description | default: site.description | escape }}",
      "breadcrumb": { "@id": "{{ site.url | append: page.url | append: '#breadcrumb' }}" },
      "inLanguage": "en-US"
    },
    {
      "@type": "BreadcrumbList",
      "@id": "{{ site.url | append: page.url | append: '#breadcrumb' }}",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "{{ site.url | append: '/' }}"
        }{% if page.url != '/' and page.url != '/index.html' %},
        {
          "@type": "ListItem",
          "position": 2,
          "name": "{{ page.title | escape }}",
          "item": "{{ site.url | append: page.url }}"
        }
        {% endif %}
      ]
    },
    {
      "@type": "LocalBusiness",
      "@id": "{{ site.url | append: '/#localbusiness' }}",
      "name": "{{ site.title | escape }}",
      "url": "{{ site.url | append: '/' }}",
      "description": "{{ site.description | escape }}",
      "image": "{{ site.url | append: '/images/the-yoga-studio-refined-island-creations-website-design-development.webp' }}",
      "parentOrganization": { "@id": "{{ site.url | append: '/#organization' }}" },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Bali",
        "addressCountry": "ID"
      }
    }

  ]
}
</script>
